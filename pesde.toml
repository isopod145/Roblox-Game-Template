name = "isopod145/robloxluautemplate"
version = "0.1.0"
license = "MIT"

[target]
environment = "roblox"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
lyra = { wally = "paradoxum-games/lyra", version = "0.6.0" }
vide-with-types = { wally = "aloroid/vide-with-types", version = "0.2.7" }
jabby = { wally = "alicesaidhi/jabby", version = "0.5.1" }
jecs = { wally = "ukendio/jecs", version = "0.11.0" }
planck = { wally = "yetanotherclown/planck", version = "0.2.0" }
planck-jabby = { wally = "yetanotherclown/planck-jabby", version = "0.2.0" }
planck-runservice = { wally = "yetanotherclown/planck-runservice", version = "0.2.0" }
replecs = { wally = "pepeeltoro41/replecs", version = "0.3.1" }
charm = { wally = "littensy/charm", version = "0.10.0" }
charm-sync = { wally = "littensy/charm-sync", version = "0.3.0" }
vide-charm = { wally = "littensy/vide-charm", version = "0.3.0" }
t = { wally = "osyrisrblx/t", version = "3.1.1" }
promise = { wally = "evaera/promise", version = "4.0.0"}


[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
